# Keep this congruent with `Brewfile` (the LLVM that bpf-linker needs).
name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast lane: the std-testable crates (logic, config, gRPC). No eBPF toolchain,
  # no root — this gate runs in seconds and catches most regressions. `protoc`
  # is needed to compile the controller's `.proto`.
  logic:
    name: host crates — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: rustfmt
        run: cargo fmt --all -- --check
      # Exclude `velstra-ebpf` (BPF-only, no host std) and `velstra` (the agent,
      # whose build script needs bpf-linker — covered by the `build` job). The
      # rest is the host control plane: common/config/proto/controller/cni/
      # orchestrator/raft.
      - name: clippy (host crates)
        run: cargo clippy --workspace --exclude velstra-ebpf --exclude velstra --all-targets -- -D warnings
      - name: test (host crates)
        run: cargo test --workspace --exclude velstra-ebpf --exclude velstra

  # Full lane: builds the eBPF data plane (needs nightly rust-src + bpf-linker)
  # and the control plane, then runs the control-plane tests.
  build:
    name: ebpf + control plane — build & test
    # Pinned to match the images' `ubuntu:24.04` base: the COPY-prebuilt binaries
    # are dynamically linked against the runner's glibc, so runner == image base.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          # `rust-src` is required to cross-compile std for the BPF target;
          # clippy lints the host control-plane crate.
          components: rust-src, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install bpf-linker
        run: cargo install bpf-linker --locked
      - name: clippy (control plane)
        # The eBPF crate is only ever built for the bpf target via the app's
        # build script, so it is intentionally excluded from host clippy
        # (it is `no_std`/`no_main` and cannot link against the host std).
        run: cargo clippy -p velstra --all-targets -- -D warnings
      - name: Build (release, embeds the eBPF object)
        run: cargo build --release
      - name: Test control plane
        run: cargo test -p velstra
      - name: Smoke-test the agent CLI (no root needed)
        run: |
          # Agent-side policy files only; topology.toml is a controller file.
          for cfg in examples/rules.toml examples/loadbalancer.toml \
                     examples/multitenant.toml examples/router.toml examples/overlay.toml; do
            ./target/release/velstra validate "$cfg"
          done
      # Hand the freshly-built binaries to the `images` job so it doesn't repeat
      # the (slow) eBPF release build. Only on push — PRs don't publish.
      - name: Upload release binaries
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: velstra-binaries
          path: |
            target/release/velstra
            target/release/velstra-controller
            target/release/velstra-cni
          retention-days: 1
          if-no-files-found: error

  # Build the three container images from the binaries the `build` job produced
  # and push them to GHCR. Runs only on a push to the default branch or a version
  # tag — never on pull requests (which can't access the registry token anyway).
  images:
    name: container images — build & push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: velstra-binaries
          path: target/release
      - name: Restore the executable bit
        run: chmod +x target/release/velstra target/release/velstra-controller target/release/velstra-cni
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (controller, agent, cni)
        run: |
          set -eu
          # GHCR requires a lowercase owner; the SHA is always a tag, plus
          # `latest` on the default branch and the tag name on a version tag.
          REGISTRY="ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="${GITHUB_SHA:0:7}"
          for c in controller agent cni; do
            TAGS="-t ${REGISTRY}/${c}:${SHA_TAG}"
            case "$GITHUB_REF" in
              refs/heads/main|refs/heads/master) TAGS="${TAGS} -t ${REGISTRY}/${c}:latest" ;;
              refs/tags/*)                       TAGS="${TAGS} -t ${REGISTRY}/${c}:${GITHUB_REF_NAME}" ;;
            esac
            echo "building ${c}: ${TAGS}"
            docker buildx build --push -f "deploy/docker/Dockerfile.${c}" ${TAGS} .
          done
