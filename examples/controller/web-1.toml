# Per-node config served by `velstra-controller` to the node `web-1`
# (the agent runs with `--node-id web-1`). Same TOML schema as a local config;
# edit it on the controller and the agent re-applies it live.

default_action = "pass"
drop_icmp      = true
log            = false

blocklist = ["203.0.113.0/24"]

# A load-balanced HTTP VIP for this node.
[[service]]
vip   = "10.0.0.100"
port  = 80
proto = "tcp"
backends = [
  { ip = "10.0.1.2", port = 8080 },
  { ip = "10.0.1.3", port = 8080 },
]
