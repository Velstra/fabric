# cargo-release configuration (https://github.com/crate-ci/cargo-release).
#
# Tag-based releases: every workspace crate shares one version and one signed tag;
# nothing is published to crates.io. Cut a release with, e.g.:
#
#   cargo release minor        # 0.2.x -> 0.3.0   (new features)
#   cargo release patch        # 0.3.0 -> 0.3.1   (a bug-fix release)
#
# That bumps every crate, makes ONE GPG-signed commit and a signed `vX.Y.Z` tag,
# and pushes. Pushing the tag triggers .github/workflows/release.yml, which
# publishes a GitHub release whose body is that version's CHANGELOG section.
#
# NOTE: this is a *virtual* workspace with a single root CHANGELOG.md, so we do
# NOT use `[[pre-release-replacements]]` — cargo-release would apply it per crate
# (`<crate>/CHANGELOG.md`, which doesn't exist). Before releasing, move the notes
# under a dated `## [x.y.z] — YYYY-MM-DD` heading in CHANGELOG.md yourself (keep an
# empty `## [Unreleased]` on top for next time), and commit that alongside this
# config.

sign-commit = true
sign-tag = true
publish = false
push = true
shared-version = true
consolidate-commits = true
tag-name = "v{{version}}"
pre-release-commit-message = "release: fabric {{version}}"
tag-message = "fabric {{version}}"
